# =========================================================
# ABDM FHIR Service - Application Configuration
# =========================================================

spring.application.name=abdm-fhir-service
server.port=8080

# Disable Spring Boot's default error path (errors handled by GlobalExceptionHandler)
server.error.whitelabel.enabled=false

# Pretty-print JSON responses from Spring MVC (non-FHIR endpoints)
spring.jackson.serialization.indent-output=true

# =========================================================
# EHR Abstraction Layer - Provider Configuration
# =========================================================
# Selects the active EhrDataProvider implementation.
# Valid values:
#   dummy    - DummyHmsProvider    (default) returns mock data for dev/testing
#   real     - RealHmsProvider     (Phase 5) connects to production HMS
#   rest     - RestApiHmsProvider  (Phase 4+) connects to an HMS via REST API
#   database - DatabaseHmsProvider (Phase 4+) connects to an HMS database directly
ehr.provider=dummy
