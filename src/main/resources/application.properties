# =========================================================
# ABDM FHIR Service - Application Configuration
# =========================================================

spring.application.name=abdm-fhir-service
server.port=8081

# Disable Spring Boot's default error path (errors handled by GlobalExceptionHandler)
server.error.whitelabel.enabled=false

# Pretty-print JSON responses from Spring MVC (non-FHIR endpoints)
spring.jackson.serialization.indent-output=true

# =========================================================
# EHR Abstraction Layer - Provider Configuration
# =========================================================
# Selects the active EhrDataProvider implementation.
# Valid values:
#   dummy    - DummyHmsProvider    connects to the Dummy HMS (abdm_hms) database
#   real     - RealHmsProvider     (future) connects to a production HMS
#   rest     - RestApiHmsProvider  (future) connects to an HMS via REST API
#   database - DatabaseHmsProvider (future) connects to an HMS database directly
ehr.provider=dummy

# =========================================================
# Dummy HMS Database (abdm_hms) - Read-only
# =========================================================
# The FHIR service reads from this database but never writes to it.
# Table ownership and schema management belong to the HMS project.
spring.datasource.url=jdbc:mysql://localhost:3306/abdm_hms?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Never create or modify tables — the HMS owns the schema
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
