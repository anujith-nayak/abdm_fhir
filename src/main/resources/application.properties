# =========================================================
# ABDM FHIR Service - Application Configuration
# =========================================================

spring.application.name=abdm-fhir-service
server.port=8080

# Disable Spring Boot's default error path (errors handled by GlobalExceptionHandler)
server.error.whitelabel.enabled=false

# Pretty-print JSON responses from Spring MVC (non-FHIR endpoints)
spring.jackson.serialization.indent-output=true
